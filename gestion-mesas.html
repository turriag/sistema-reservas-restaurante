<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores del Mar - Gestión de Mesas</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gestion-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }
        
        .gestion-card {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .gestion-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            padding: 25px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .gestion-header h1 {
            color: white;
            font-size: 1.5rem;
            margin: 0;
        }
        
        .gestion-header h1 i {
            margin-right: 10px;
        }
        
        .gestion-header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 0.85rem;
        }
        
        .btn-volver {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* Back to home button */
        .back-to-home {
            margin-bottom: 20px;
        }
        
        .back-to-home a {
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        
        .back-to-home a:hover {
            color: var(--color-secondary);
            text-decoration: underline;
        }
        
        .gestion-body {
            padding: 30px;
        }
        
        .acciones-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .search-box {
            flex: 1;
            max-width: 300px;
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid var(--color-gray-200);
            border-radius: 12px;
            font-size: 0.9rem;
        }
        
        .filtro-estado select {
            padding: 12px 20px;
            border: 2px solid var(--color-gray-200);
            border-radius: 12px;
            background: white;
            cursor: pointer;
        }
        
        .mapa-mesas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .mapa-mesa {
            background: var(--color-gray-50);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .mapa-mesa:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .mapa-mesa.ocupada {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        }
        
        .mapa-mesa.disponible {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
        }
        
        .mapa-mesa-numero {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .mapa-mesa-capacidad {
            font-size: 0.85rem;
            color: var(--color-gray-600);
        }
        
        .pagination-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .status-disponible {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .status-ocupada {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        
        /* Toast notifications */
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            min-width: 280px;
            max-width: 400px;
            z-index: 10000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            border-left: 4px solid;
        }
        
        .toast-notification.show {
            transform: translateX(0);
        }
        
        .toast-content {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        
        .toast-success {
            border-left-color: #10b981;
            background: linear-gradient(135deg, #fff 0%, #f0fdf4 100%);
        }
        
        .toast-success i {
            color: #10b981;
        }
        
        .toast-error {
            border-left-color: #ef4444;
            background: linear-gradient(135deg, #fff 0%, #fef2f2 100%);
        }
        
        .toast-error i {
            color: #ef4444;
        }
        
        .toast-info {
            border-left-color: #3b82f6;
            background: linear-gradient(135deg, #fff 0%, #eff6ff 100%);
        }
        
        .toast-info i {
            color: #3b82f6;
        }
        
        .toast-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }
        
        .toast-close:hover {
            color: #666;
        }
        
        @media (max-width: 768px) {
            .gestion-body {
                padding: 20px;
            }
            
            .acciones-bar {
                flex-direction: column;
            }
            
            .search-box {
                max-width: 100%;
            }
            
            .gestion-header {
                flex-direction: column;
                text-align: center;
            }
            
            .mapa-mesas {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .toast-notification {
                left: 20px;
                right: 20px;
                min-width: auto;
                max-width: none;
            }
        }
    </style>
</head>
<body>
    <div class="gestion-container">
        <div class="gestion-card">
            <div class="gestion-header">
                <div>
                    <h1><i class="fas fa-chair"></i> Gestión de Mesas</h1>
                    <p>Administra todas las mesas del restaurante</p>
                </div>
                <a href="dashboard-admin.html" class="btn-volver">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>
            </div>
            <div class="gestion-body">
                <!-- Back to home -->
                <div class="back-to-home">
                    <a href="index.html">
                        <i class="fas fa-home"></i> Volver al inicio
                    </a>
                </div>

                <div id="mesasStats"></div>

                <div class="acciones-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="buscarMesa" placeholder="Buscar por ID o ubicación...">
                    </div>
                    <div class="filtro-estado">
                        <select id="filtroMesaEstado">
                            <option value="todos">Todas las mesas</option>
                            <option value="disponible">Disponibles</option>
                            <option value="ocupada">Ocupadas</option>
                        </select>
                    </div>
                    <div>
                        <button id="nuevaMesaBtn" class="btn-primary">
                            <i class="fas fa-plus"></i> Nueva Mesa
                        </button>
                        <button id="liberarTodasBtn" class="btn-warning">
                            <i class="fas fa-door-open"></i> Liberar Todas
                        </button>
                    </div>
                </div>

                <!-- Mapa visual de mesas -->
                <div id="mapaMesas" class="mapa-mesas"></div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID Mesa</th>
                                <th>Capacidad</th>
                                <th>Ubicación</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="mesasTableBody">
                            <tr><td colspan="5" style="text-align: center;">Cargando...</div></div></tr>
                        </tbody>
                    </table>
                </div>

                <div id="mesasPagination" class="pagination-container"></div>
            </div>
        </div>
    </div>

    <!-- Modal Mesa -->
    <div id="mesaModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalMesaTitle">Nueva Mesa</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mesaForm">
                    <input type="hidden" id="mesaId">
                    <div class="form-group">
                        <label class="form-label required">Capacidad</label>
                        <input type="number" id="mesaCapacidad" class="form-control" min="1" max="20" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">Ubicación</label>
                        <select id="mesaUbicacion" class="form-control" required>
                            <option value="Salón principal">Salón principal</option>
                            <option value="Terraza">Terraza</option>
                            <option value="Salón VIP">Salón VIP</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">Estado</label>
                        <select id="mesaEstado" class="form-control">
                            <option value="disponible">Disponible</option>
                            <option value="ocupada">Ocupada</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-outline-primary" onclick="gestionMesas.cerrarModal()">Cancelar</button>
                <button class="btn-primary" onclick="gestionMesas.guardarMesa()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- LIBRERÍA DE SUPABASE (PRIMERO) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- TUS ARCHIVOS (DESPUÉS) -->
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/gestion-mesas.js"></script>
</body>
</html>
