<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial y Notificaciones - Restaurante Gourmet</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .historial-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }
        
        .historial-card {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .historial-header {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            padding: 25px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .historial-header h1 {
            color: white;
            font-size: 1.5rem;
            margin: 0;
        }
        
        .historial-header h1 i {
            margin-right: 10px;
        }
        
        .historial-header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 0.85rem;
        }
        
        .btn-volver {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-volver:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--color-gray-200);
            background: white;
            padding: 0 30px;
        }
        
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--color-gray-500);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab:hover {
            color: var(--color-primary);
        }
        
        .tab.active {
            color: var(--color-primary);
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--color-primary);
        }
        
        .tab-content {
            display: none;
            padding: 30px;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .filtros-container {
            background: var(--color-gray-50);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .filtros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }
        
        .notificacion-item {
            background: white;
            border: 1px solid var(--color-gray-200);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .notificacion-item:hover {
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .notificacion-item.no-leida {
            background: rgba(218, 165, 32, 0.05);
            border-left: 4px solid var(--color-secondary);
        }
        
        .notificacion-icono {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-secondary-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .notificacion-icono i {
            color: var(--color-primary);
            font-size: 1.2rem;
        }
        
        .notificacion-contenido {
            flex: 1;
        }
        
        .notificacion-mensaje {
            margin-bottom: 8px;
            line-height: 1.5;
        }
        
        .notificacion-fecha {
            font-size: 0.7rem;
            color: var(--color-gray-400);
        }
        
        .notificacion-acciones {
            display: flex;
            gap: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--color-gray-300);
            margin-bottom: 20px;
        }
        
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-mini-card {
            background: var(--color-gray-50);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-mini-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--color-primary);
        }
        
        .stat-mini-label {
            font-size: 0.75rem;
            color: var(--color-gray-500);
        }
        
        @media (max-width: 768px) {
            .tabs {
                padding: 0 15px;
            }
            
            .tab {
                padding: 12px 15px;
                font-size: 0.85rem;
            }
            
            .tab-content {
                padding: 20px;
            }
            
            .filtros-grid {
                grid-template-columns: 1fr;
            }
            
            .notificacion-item {
                flex-direction: column;
            }
            
            .notificacion-acciones {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="historial-container">
        <div class="historial-card">
            <div class="historial-header">
                <div>
                    <h1><i class="fas fa-history"></i> Historial y Notificaciones</h1>
                    <p>Consulta el historial completo del sistema y las notificaciones enviadas</p>
                </div>
                <a href="dashboard-admin.html" class="btn-volver">
                    <i class="fas fa-arrow-left"></i> Volver al Dashboard
                </a>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="historial">
                    <i class="fas fa-history"></i> Historial del Sistema
                </button>
                <button class="tab" data-tab="notificaciones">
                    <i class="fas fa-bell"></i> Notificaciones
                </button>
            </div>
            
            <!-- Tab Historial -->
            <div id="tab-historial" class="tab-content active">
                <div id="historialStats"></div>
                
                <div class="filtros-container">
                    <div class="filtros-grid">
                        <div class="form-group">
                            <label class="form-label">Fecha Inicio</label>
                            <input type="date" id="historialFechaInicio" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha Fin</label>
                            <input type="date" id="historialFechaFin" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tipo</label>
                            <select id="historialTipo" class="form-control">
                                <option value="todos">Todos</option>
                                <option value="cliente">Clientes</option>
                                <option value="mesa">Mesas</option>
                                <option value="reserva">Reservas</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Usuario</label>
                            <input type="text" id="buscarUsuario" class="form-control" placeholder="Buscar por usuario...">
                        </div>
                        <div class="form-group">
                            <button id="aplicarFiltrosHistorial" class="btn-primary" style="width: 100%;">
                                <i class="fas fa-filter"></i> Aplicar Filtros
                            </button>
                        </div>
                        <div class="form-group">
                            <button id="limpiarFiltrosHistorial" class="btn-outline-primary" style="width: 100%;">
                                <i class="fas fa-eraser"></i> Limpiar
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="acciones-bar" style="justify-content: flex-end; margin-bottom: 20px;">
                    <button id="refrescarHistorial" class="btn-outline-primary">
                        <i class="fas fa-sync-alt"></i> Refrescar
                    </button>
                    <button id="exportarHistorial" class="btn-primary">
                        <i class="fas fa-download"></i> Exportar Historial
                    </button>
                </div>
                
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Fecha y Hora</th>
                                <th>Tipo</th>
                                <th>Descripción</th>
                                <th>Usuario</th>
                                <th>Detalles</th>
                            </tr>
                        </thead>
                        <tbody id="historialTableBody">
                            <tr><td colspan="5" style="text-align: center;">Cargando historial...</td><td></td></tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="historialPagination" class="pagination-container"></div>
            </div>
            
            <!-- Tab Notificaciones -->
            <div id="tab-notificaciones" class="tab-content">
                <div class="stats-mini" id="notificacionesStats"></div>
                
                <div class="filtros-container">
                    <div class="filtros-grid">
                        <div class="form-group">
                            <label class="form-label">Buscar por correo</label>
                            <input type="text" id="buscarNotificacionEmail" class="form-control" placeholder="correo@ejemplo.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha desde</label>
                            <input type="date" id="notifFechaInicio" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fecha hasta</label>
                            <input type="date" id="notifFechaFin" class="form-control">
                        </div>
                        <div class="form-group">
                            <button id="buscarNotificaciones" class="btn-primary" style="width: 100%;">
                                <i class="fas fa-search"></i> Buscar
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="acciones-bar" style="justify-content: flex-end; margin-bottom: 20px;">
                    <button id="marcarTodasLeidas" class="btn-outline-primary">
                        <i class="fas fa-check-double"></i> Marcar todas como leídas
                    </button>
                    <button id="enviarNotificacionBtn" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Enviar Notificación
                    </button>
                </div>
                
                <div id="notificacionesList"></div>
                
                <div id="notificacionesPagination" class="pagination-container"></div>
            </div>
        </div>
    </div>
    
    <!-- Modal Enviar Notificación -->
    <div id="enviarNotificacionModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> Enviar Notificación</h3>
                <button class="modal-close" onclick="historial.cerrarModalNotificacion()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="notificacionForm">
                    <div class="form-group">
                        <label class="form-label required">Correo del cliente</label>
                        <input type="email" id="notifCorreo" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">Mensaje</label>
                        <textarea id="notifMensaje" class="form-control" rows="4" required placeholder="Escribe el mensaje de la notificación..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo</label>
                        <select id="notifTipo" class="form-control">
                            <option value="info">Informativo</option>
                            <option value="success">Éxito</option>
                            <option value="warning">Advertencia</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-outline-primary" onclick="historial.cerrarModalNotificacion()">Cancelar</button>
                <button class="btn-primary" onclick="historial.enviarNotificacion()">Enviar</button>
            </div>
        </div>
    </div>
    
    <!-- Modal Detalle -->
    <div id="detalleModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Detalle del Registro</h3>
                <button class="modal-close" onclick="historial.cerrarDetalleModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="detalleContenido"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="historial.cerrarDetalleModal()">Cerrar</button>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/historial.js"></script>
</body>
</html>
