<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Restaurante Gourmet</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .recuperar-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .recuperar-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recuperar-header {
            background: linear-gradient(135deg, #8B5A2B 0%, #6B3E1A 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .recuperar-header i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .recuperar-header h1 {
            font-size: 1.75rem;
            margin-bottom: 8px;
            color: white;
        }

        .recuperar-header p {
            opacity: 0.9;
            font-size: 0.85rem;
        }

        .recuperar-body {
            padding: 35px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d2d3f;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #8B5A2B;
            box-shadow: 0 0 0 4px rgba(139, 90, 43, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #8B5A2B 0%, #6B3E1A 100%);
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 90, 43, 0.4);
        }

        .btn-outline {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            background: transparent;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .btn-outline:hover {
            border-color: #8B5A2B;
            background: #fef3e8;
        }

        .message {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .message-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .message.show {
            display: block;
        }

        .link-volver {
            text-align: center;
            margin-top: 20px;
        }

        .link-volver a {
            color: #8B5A2B;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="recuperar-container">
        <div class="recuperar-card">
            <div class="recuperar-header">
                <i class="fas fa-key"></i>
                <h1>Recuperar Contraseña</h1>
                <p>Te enviaremos un enlace para restablecer tu contraseña</p>
            </div>
            <div class="recuperar-body">
                <div id="message" class="message"></div>
                
                <form id="recuperarForm">
                    <div class="form-group">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-paper-plane"></i> Enviar enlace
                    </button>
                </form>
                
                <div class="link-volver">
                    <a href="login.html">
                        <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/recuperar-password.js"></script>
</body>
</html>
