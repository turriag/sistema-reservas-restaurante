<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores del Mar - Mi Perfil</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-utensils"></i>
                    <span>Sabores del Mar</span>
                </div>
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-name" id="userName">Cargando...</div>
                    <div class="user-email" id="userEmail">cargando@email.com</div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item" onclick="window.location.href='dashboard-cliente.html'">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </div>
                <div class="nav-item" onclick="window.location.href='crear-reserva.html'">
                    <i class="fas fa-calendar-plus"></i><span>Hacer Reserva</span>
                </div>
                <div class="nav-item" onclick="window.location.href='disponibilidad.html'">
                    <i class="fas fa-search"></i><span>Consultar Disponibilidad</span>
                </div>
                <div class="nav-item" onclick="window.location.href='mis-reservas.html'">
                    <i class="fas fa-list-alt"></i><span>Mis Reservas</span>
                </div>
                <div class="nav-item active" onclick="window.location.href='perfil.html'">
                    <i class="fas fa-user"></i><span>Mi Perfil</span>
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h2>Mi Perfil</h2>
                    <p>Administra tu información personal</p>
                </div>
                <div class="user-actions">
                    <div class="logout-btn" onclick="authService.logout()">
                        <i class="fas fa-sign-out-alt"></i><span>Cerrar Sesión</span>
                    </div>
                </div>
            </div>

            <!-- Back to home -->
            <div style="margin-bottom: 20px;">
                <a href="index.html" style="color: #8B5A2B; text-decoration: none;">
                    <i class="fas fa-home"></i> Volver al inicio
                </a>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h3><i class="fas fa-user-circle"></i> Información Personal</h3>
                </div>
                
                <form id="perfilForm">
                    <div class="form-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;">
                        <div class="form-group">
                            <label class="form-label">Nombre completo</label>
                            <input type="text" id="perfilNombre" class="form-control-modern">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" id="perfilEmail" class="form-control-modern" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Teléfono</label>
                            <input type="tel" id="perfilTelefono" class="form-control-modern">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Miembro desde</label>
                            <input type="text" id="perfilRegistro" class="form-control-modern" readonly>
                        </div>
                    </div>
                    
                    <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px; justify-content: flex-end;">
                        <button type="button" class="btn-outline-primary" onclick="window.location.href='dashboard-cliente.html'">Cancelar</button>
                        <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <div id="loader" class="loader-overlay"><div class="loader-spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
