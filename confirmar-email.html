<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Email - Restaurante Gourmet</title>
    <link rel="icon" type="image/png" href="img/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #2d2d3f;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        p {
            color: #666;
            line-height: 1.6;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #8B5A2B;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #8B5A2B, #6B3E1A);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon" id="icon">✉️</div>
        <h1 id="title">Confirmando tu correo...</h1>
        <div id="spinner" class="spinner"></div>
        <p id="message">Por favor espera, estamos verificando tu cuenta.</p>
    </div>

    <script>
        const SUPABASE_URL = 'https://fijdyrbfvwtvmbpedyhjl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ifeKGvdbxBexiO3Jd9QTDA_5u7-vCMt';
        const supabase = supabaseClient.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function confirmar() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const accessToken = params.get('access_token');
            const refreshToken = params.get('refresh_token');
            
            const titleEl = document.getElementById('title');
            const messageEl = document.getElementById('message');
            const iconEl = document.getElementById('icon');
            const spinnerEl = document.getElementById('spinner');
            
            if (accessToken) {
                try {
                    const { error } = await supabase.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    if (error) throw error;
                    
                    spinnerEl.style.display = 'none';
                    iconEl.innerHTML = '✅';
                    iconEl.className = 'icon success';
                    titleEl.textContent = '¡Email confirmado!';
                    messageEl.innerHTML = 'Tu cuenta ha sido verificada exitosamente.<br>Redirigiendo al inicio de sesión...';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                    
                } catch (error) {
                    spinnerEl.style.display = 'none';
                    iconEl.innerHTML = '❌';
                    iconEl.className = 'icon error';
                    titleEl.textContent = 'Error al confirmar';
                    messageEl.textContent = error.message || 'Ocurrió un error inesperado.';
                }
            } else {
                spinnerEl.style.display = 'none';
                iconEl.innerHTML = '⚠️';
                iconEl.className = 'icon warning';
                titleEl.textContent = 'Enlace inválido';
                messageEl.innerHTML = 'El enlace de confirmación no es válido o ha expirado.<br><br><a href="login.html" class="btn">Ir al inicio de sesión</a>';
            }
        }
        
        confirmar();
    </script>
</body>
</html>
